<style>
  :root{
    --bg:#F1F1FA;--surface:#FFFFFF;--ink:#17171F;--ink-soft:#6C6C7E;--ink-faint:#9A9AAB;
    --line:#E6E6F1;--line-strong:#D6D6E6;--accent:#5B4FE9;--accent-deep:#4133C9;--accent-wash:#EEEBFD;
    --pro:#FF6B5C;--pro-deep:#E5503F;--pro-wash:#FFEDEA;--ok:#11A36B;
    --radius:14px;--radius-sm:10px;
    --shadow:0 1px 2px rgba(23,23,31,.04), 0 8px 24px -12px rgba(23,23,31,.12);
    --shadow-lg:0 24px 60px -20px rgba(23,23,31,.28);
    --font-display:'Space Grotesk';--font-body:'Inter';
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:var(--font-body),system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
  ::selection{background:var(--accent);color:#fff}
  .wrap{max-width:920px;margin:0 auto;padding:0 20px}

  /* RTL + Arabic font */
  html[dir="rtl"] body{font-family:'Cairo',system-ui,sans-serif}
  html[dir="rtl"] .brand,html[dir="rtl"] .hero h1,html[dir="rtl"] .drop h3,html[dir="rtl"] .modal h3,
  html[dir="rtl"] .results-head h2,html[dir="rtl"] .fmt .nm,html[dir="rtl"] .modal .price b{font-family:'Cairo',sans-serif}

  /* top bar */
  .bar{display:flex;align-items:center;justify-content:space-between;padding:18px 0;gap:12px}
  .bar-right{display:flex;align-items:center;gap:10px}
  .brand{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:700;font-size:19px;letter-spacing:-.02em}
  .brand .glyph{width:30px;height:30px;border-radius:8px;flex:none;background:var(--ink);position:relative;overflow:hidden}
  .brand .glyph::before{content:"";position:absolute;inset:7px 13px 7px 7px;background:var(--accent);border-radius:2px}
  .brand .glyph::after{content:"";position:absolute;inset:7px 7px 13px 17px;background:var(--pro);border-radius:2px}

  .lang-switch{display:inline-flex;background:#fff;border:1px solid var(--line-strong);border-radius:999px;padding:3px;gap:2px}
  .lang-switch button{font-family:var(--font-body);font-weight:600;font-size:13px;border:none;background:none;color:var(--ink-soft);padding:5px 12px;border-radius:999px;cursor:pointer;transition:color .12s}
  html[dir="rtl"] .lang-switch button{font-family:'Cairo',sans-serif}
  .lang-switch button.on{background:var(--ink);color:#fff}

  .pro-pill{font-family:var(--font-body);font-weight:600;font-size:13.5px;display:inline-flex;align-items:center;gap:7px;padding:8px 15px;border-radius:999px;cursor:pointer;border:1px solid var(--line-strong);background:var(--surface);color:var(--ink);transition:border-color .15s, transform .06s}
  html[dir="rtl"] .pro-pill{font-family:'Cairo',sans-serif}
  .pro-pill:hover{border-color:var(--pro)}
  .pro-pill:active{transform:translateY(1px)}
  .pro-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--pro)}
  .pro-pill.is-pro{background:var(--ink);color:#fff;border-color:var(--ink)}
  .pro-pill.is-pro .dot{background:var(--ok)}

  /* hero */
  .hero{padding:30px 0 26px;max-width:660px}
  .hero h1{font-family:var(--font-display);font-weight:700;font-size:clamp(30px,5.4vw,46px);line-height:1.04;letter-spacing:-.03em}
  html[dir="rtl"] .hero h1{line-height:1.2;letter-spacing:0}
  .hero h1 .hl{color:var(--accent)}
  .hero p{margin-top:14px;font-size:16.5px;color:var(--ink-soft);max-width:540px}
  .trust{margin-top:16px;display:flex;flex-wrap:wrap;gap:8px 18px;font-size:13.5px;color:var(--ink-faint)}
  .trust span{display:inline-flex;align-items:center;gap:6px}
  .trust svg{width:14px;height:14px;flex:none}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:8px;margin-bottom:18px}

  .drop{border:2px dashed var(--line-strong);border-radius:var(--radius-sm);padding:34px 22px;text-align:center;cursor:pointer;transition:border-color .15s, background .15s;background:linear-gradient(180deg,#fff,#fafaff)}
  .drop:hover,.drop.drag{border-color:var(--accent);background:var(--accent-wash)}
  .drop .ic{width:46px;height:46px;border-radius:12px;margin:0 auto 12px;background:var(--accent-wash);display:grid;place-items:center;color:var(--accent)}
  .drop .ic svg{width:24px;height:24px}
  .drop h3{font-family:var(--font-display);font-weight:600;font-size:17px;letter-spacing:-.01em}
  .drop p{font-size:13.5px;color:var(--ink-faint);margin-top:4px}
  .drop .browse{color:var(--accent);font-weight:600;text-decoration:underline;text-underline-offset:2px}

  .controls{padding:18px 14px 6px;display:none}
  .controls.show{display:block}
  .ctl-row{margin-bottom:18px}
  .ctl-label{display:flex;align-items:center;gap:8px;justify-content:space-between;font-size:12.5px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;margin-bottom:9px}
  html[dir="rtl"] .ctl-label{text-transform:none;letter-spacing:0;font-size:13px}
  .ctl-label .hint{text-transform:none;letter-spacing:0;font-weight:450;color:var(--ink-faint)}

  .formats{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:9px}
  .fmt{position:relative;border:1.5px solid var(--line);border-radius:11px;padding:11px 10px 10px;cursor:pointer;background:#fff;text-align:start;transition:border-color .12s, box-shadow .12s;display:flex;flex-direction:column;gap:8px}
  .fmt:hover{border-color:var(--line-strong)}
  .fmt.sel{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-wash)}
  .fmt .shapebox{height:34px;display:flex;align-items:center;gap:8px}
  .fmt .shape{background:var(--accent-wash);border:1.5px solid var(--accent);border-radius:2px;flex:none}
  .fmt.sel .shape{background:var(--accent);border-color:var(--accent)}
  .fmt .nm{font-size:12.5px;font-weight:600;color:var(--ink);line-height:1.2}
  .fmt .dim{font-size:11px;color:var(--ink-faint);font-variant-numeric:tabular-nums;direction:ltr}
  .fmt .check{position:absolute;top:8px;inset-inline-end:8px;width:16px;height:16px;border-radius:50%;background:var(--accent);color:#fff;display:none;place-items:center}
  .fmt .check svg{width:10px;height:10px}
  .fmt.sel .check{display:grid}
  .multi-note{margin-top:10px;font-size:12.5px;color:var(--pro-deep);display:none;align-items:center;gap:7px}
  .multi-note.show{display:flex}
  .multi-note a{color:var(--pro-deep);font-weight:600;cursor:pointer;text-decoration:underline}

  .opts{display:flex;flex-wrap:wrap;gap:16px 22px;align-items:flex-end}
  .opt{display:flex;flex-direction:column;gap:9px;min-width:0}
  .seg{display:inline-flex;background:#F1F1F8;border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px}
  .seg button{font-family:var(--font-body);font-size:13px;font-weight:500;color:var(--ink-soft);border:none;background:none;padding:6px 13px;border-radius:6px;cursor:pointer;position:relative;transition:color .12s}
  html[dir="rtl"] .seg button{font-family:'Cairo',sans-serif}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06);font-weight:600}
  .seg button .pl{color:var(--pro);font-size:10px;font-weight:700;margin-inline-start:3px;vertical-align:top}

  .slider{display:flex;align-items:center;gap:12px;min-width:200px}
  input[type=range]{-webkit-appearance:none;appearance:none;height:5px;border-radius:5px;background:linear-gradient(90deg,var(--accent) var(--pct,80%), var(--line-strong) var(--pct,80%));width:150px;cursor:pointer;direction:ltr}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.18);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid var(--accent);cursor:pointer}
  .slider .val{font-size:13.5px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums;min-width:38px;direction:ltr}
  .slider.disabled{opacity:.4;pointer-events:none}

  .bgswatch{display:flex;align-items:center;gap:8px}
  .bgswatch input[type=color]{width:30px;height:30px;border:1px solid var(--line-strong);border-radius:7px;background:none;cursor:pointer;padding:2px}
  .bgswatch label{font-size:13px;color:var(--ink-soft);display:flex;align-items:center;gap:6px;cursor:pointer}
  .bgwrap{display:none}
  .bgwrap.show{display:flex;flex-direction:column;gap:9px}

  .action{padding:18px 14px 16px;display:none;border-top:1px solid var(--line);margin-top:6px}
  .action.show{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .btn{font-family:var(--font-body);font-weight:600;font-size:15px;border:none;border-radius:11px;padding:13px 24px;cursor:pointer;display:inline-flex;align-items:center;gap:9px;transition:transform .06s, background .15s, box-shadow .15s}
  html[dir="rtl"] .btn{font-family:'Cairo',sans-serif}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--accent);color:#fff;box-shadow:0 6px 16px -6px rgba(91,79,233,.6)}
  .btn-primary:hover{background:var(--accent-deep)}
  .btn-primary:disabled{background:var(--line-strong);color:var(--ink-faint);box-shadow:none;cursor:not-allowed}
  html[dir="rtl"] .btn-primary svg,html[dir="rtl"] .drop .ic svg{transform:scaleX(1)}
  .btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line-strong)}
  .btn-ghost:hover{border-color:var(--ink-soft)}
  .action .meta{font-size:13px;color:var(--ink-faint)}
  .action .meta b{color:var(--ink-soft);font-weight:600}

  .results{margin-bottom:40px}
  .results-head{display:none;align-items:center;justify-content:space-between;margin:4px 2px 14px;flex-wrap:wrap;gap:12px}
  .results-head.show{display:flex}
  .results-head h2{font-family:var(--font-display);font-weight:600;font-size:19px;letter-spacing:-.01em}
  .results-head .saved{font-size:13.5px;color:var(--ok);font-weight:600}
  .dl-zip{font-family:var(--font-body);font-weight:600;font-size:14px;background:var(--ink);color:#fff;border:none;border-radius:10px;padding:10px 18px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:transform .06s, opacity .15s}
  html[dir="rtl"] .dl-zip{font-family:'Cairo',sans-serif}
  .dl-zip:hover{opacity:.9}
  .dl-zip:active{transform:translateY(1px)}
  .dl-zip .pl{color:var(--pro);font-size:10px;font-weight:700;margin-inline-start:2px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:14px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
  .card .thumb{aspect-ratio:1/1;background:conic-gradient(#f4f4fa 90deg,#fff 0 180deg,#f4f4fa 0 270deg,#fff 0) 0 0/16px 16px;display:grid;place-items:center;position:relative;overflow:hidden}
  .card .thumb img{max-width:100%;max-height:100%;display:block;object-fit:contain}
  .card .badge{position:absolute;top:8px;inset-inline-start:8px;font-size:10.5px;font-weight:600;background:rgba(23,23,31,.82);color:#fff;padding:3px 8px;border-radius:6px;backdrop-filter:blur(4px);font-variant-numeric:tabular-nums;direction:ltr}
  .card .info{padding:11px 12px 12px}
  .card .fn{font-size:12.5px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:ltr;text-align:start}
  .card .sz{margin-top:5px;display:flex;align-items:center;gap:6px;font-size:12px;font-variant-numeric:tabular-nums;direction:ltr}
  html[dir="rtl"] .card .sz{flex-direction:row}
  .card .sz .old{color:var(--ink-faint);text-decoration:line-through}
  .card .sz .arrow{color:var(--ink-faint)}
  .card .sz .new{color:var(--ink);font-weight:600}
  .card .sz .pc{margin-inline-start:auto;color:var(--ok);font-weight:600}
  .card .sz .pc.up{color:var(--pro-deep)}
  .card .dl{margin-top:10px;width:100%;font-family:var(--font-body);font-size:12.5px;font-weight:600;background:#F1F1F8;color:var(--ink);border:none;border-radius:8px;padding:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .12s}
  html[dir="rtl"] .card .dl{font-family:'Cairo',sans-serif}
  .card .dl:hover{background:var(--accent-wash);color:var(--accent)}
  .card.pending .thumb{background:#f6f6fb}
  .spinner{width:22px;height:22px;border:2.5px solid var(--line-strong);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .queue{padding:0 14px 4px;display:none}
  .queue.show{display:block}
  .queue-list{display:flex;flex-wrap:wrap;gap:8px}
  .qchip{display:inline-flex;align-items:center;gap:8px;background:#F5F5FB;border:1px solid var(--line);border-radius:8px;padding:6px 8px 6px 10px;font-size:12.5px;max-width:220px}
  .qchip .qn{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink-soft);direction:ltr}
  .qchip .qx{width:16px;height:16px;border-radius:50%;background:var(--line-strong);color:#fff;border:none;cursor:pointer;display:grid;place-items:center;flex:none}
  .qchip .qx svg{width:8px;height:8px}
  .qlimit{margin-top:10px;font-size:12.5px;color:var(--pro-deep);display:none;align-items:center;gap:7px}
  .qlimit.show{display:flex}
  .qlimit a{color:var(--pro-deep);font-weight:600;cursor:pointer;text-decoration:underline}

  .scrim{position:fixed;inset:0;background:rgba(23,23,31,.5);backdrop-filter:blur(3px);display:none;place-items:center;z-index:50;padding:20px}
  .scrim.show{display:grid}
  .modal{background:#fff;border-radius:18px;max-width:430px;width:100%;box-shadow:var(--shadow-lg);overflow:hidden;animation:pop .2s ease}
  @keyframes pop{from{transform:scale(.96) translateY(8px);opacity:0}to{transform:none;opacity:1}}
  .modal-top{padding:26px 26px 0;position:relative}
  .modal-top .x{position:absolute;top:18px;inset-inline-end:18px;width:30px;height:30px;border-radius:8px;border:none;background:#F1F1F8;color:var(--ink-soft);cursor:pointer;display:grid;place-items:center}
  .modal-top .x:hover{background:var(--line-strong)}
  .modal .kicker{font-size:12.5px;font-weight:700;color:var(--pro);text-transform:uppercase;letter-spacing:.06em}
  html[dir="rtl"] .modal .kicker{letter-spacing:0}
  .modal h3{font-family:var(--font-display);font-weight:700;font-size:24px;letter-spacing:-.02em;margin-top:8px}
  .modal .price{margin-top:6px;font-size:14px;color:var(--ink-soft)}
  .modal .price b{font-family:var(--font-display);color:var(--ink);font-size:22px;font-weight:700}
  .feat{padding:20px 26px 4px;display:flex;flex-direction:column;gap:11px}
  .feat .f{display:flex;align-items:flex-start;gap:11px;font-size:14px}
  .feat .f svg{width:18px;height:18px;color:var(--ok);flex:none;margin-top:1px}
  .feat .f b{font-weight:600}
  .modal-foot{padding:18px 26px 26px;display:flex;flex-direction:column;gap:10px}
  .modal-foot .buy{background:var(--pro);color:#fff;border:none;border-radius:12px;padding:14px;font-family:var(--font-body);font-weight:600;font-size:15.5px;cursor:pointer;transition:background .15s}
  html[dir="rtl"] .modal-foot .buy{font-family:'Cairo',sans-serif}
  .modal-foot .buy:hover{background:var(--pro-deep)}
  .modal-foot .demo{font-size:12.5px;color:var(--ink-faint);text-align:center;line-height:1.5}
  .modal-foot .demo a{color:var(--accent);cursor:pointer;text-decoration:underline;font-weight:500}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:13px 20px;border-radius:11px;font-size:14px;font-weight:500;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;z-index:60;display:flex;align-items:center;gap:9px;max-width:90vw}
  html[dir="rtl"] .toast{font-family:'Cairo',sans-serif}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast svg{width:17px;height:17px;color:var(--ok);flex:none}

  .faq{margin:0 0 44px}
  .faq h2{font-family:var(--font-display);font-weight:600;font-size:22px;letter-spacing:-.01em;margin-bottom:14px}
  html[dir="rtl"] .faq h2{font-family:'Cairo',sans-serif}
  .faq-item{background:var(--surface);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)}
  .faq-item summary{cursor:pointer;padding:15px 18px;font-weight:600;font-size:15px;list-style:none;display:flex;justify-content:space-between;align-items:center;gap:14px}
  .faq-item summary::-webkit-details-marker{display:none}
  .faq-item summary::after{content:"+";font-size:21px;line-height:1;color:var(--accent);font-weight:400;flex:none}
  .faq-item[open] summary::after{content:"\2212"}
  .faq-a{padding:0 18px 16px;font-size:14px;color:var(--ink-soft);line-height:1.65}
  html[dir="rtl"] .faq-item summary,html[dir="rtl"] .faq-a{font-family:'Cairo',sans-serif}
  html[dir="rtl"] .faq-a{line-height:1.95;padding-bottom:18px}
  html[dir="rtl"] .faq-item summary{padding:16px 18px;line-height:1.7}

  footer{padding:28px 0 36px;border-top:1px solid var(--line);margin-top:10px}
  footer .fwrap{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;font-size:13px;color:var(--ink-faint)}
  footer a{color:var(--ink-soft);text-decoration:none;cursor:pointer}
  footer a:hover{color:var(--accent)}

  @media (max-width:560px){
    .hero{padding:22px 0 20px}
    .opts{gap:14px 18px}
    .btn{width:100%;justify-content:center}
    .action .meta{width:100%;text-align:center}
  }
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms !important;transition-duration:.001ms !important}}
</style>

  "@context":"https://schema.org",
  "@type":"FAQPage",
  "mainEntity":[
    {"@type":"Question","name":"Is Postfit free?","acceptedAnswer":{"@type":"Answer","text":"Yes. Resizing and compressing up to 5 images at a time, one format at a time, is completely free with no sign-up. A one-time $9 Pro unlock adds unlimited batches, export to every social media size at once, WebP output and ZIP download."}},

    // PNG note state
    $('qNote').textContent = outType==='image/png'? s.pngNote : '';
  }

  function renderFaq(){
    $('faqTitle').textContent=T().faqTitle;
    $('faqList').innerHTML=T().faq.map(f=>`<details class="faq-item"><summary>${f.q}</summary><div class="faq-a">${f.a}</div></details>`).join('');
  }

  // ---------- toast ----------
  function showToast(msg){$('toastText').textContent=msg;$('toast').classList.add('show');clearTimeout(showToast._t);showToast._t=setTimeout(()=>$('toast').classList.remove('show'),2600);}

  // ---------- format cards ----------
  function shapeStyle(w,h){const max=30,r=w/h;let sw,sh;if(r>=1){sw=max;sh=Math.round(max/r);}else{sh=max;sw=Math.round(max*r);}return `width:${sw}px;height:${Math.max(sh,6)}px`;}
  function renderFormats(){
    const el=$('formats');el.innerHTML='';
    FORMATS.forEach(f=>{
      const sel=selected.has(f.id);
      const b=document.createElement('button');
      b.className='fmt'+(sel?' sel':'');
      b.innerHTML=`<div class="shapebox"><span class="shape" style="${shapeStyle(f.w,f.h)}"></span></div>
        <div><div class="nm">${f[lang]}</div><div class="dim">${f.w}×${f.h}</div></div>
        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg></span>`;
      b.addEventListener('click',()=>toggleFormat(f.id));
      el.appendChild(b);
    });
  }
  function toggleFormat(id){
    if(selected.has(id)){ if(selected.size===1)return; selected.delete(id); }
    else{
      if(!isPro){ selected.clear(); selected.add(id); $('multiNote').classList.add('show'); setTimeout(()=>$('multiNote').classList.remove('show'),3200); }
      else selected.add(id);
    }
    renderFormats(); updateAction();
  }

  // ---------- files ----------
  function addFiles(list){
    const imgs=[...list].filter(f=>f.type.startsWith('image/'));
    if(!imgs.length){showToast(T().tNotImg);return;}
    imgs.forEach(f=>queue.push({id:uid(),file:f,name:f.name}));
    if(!isPro&&queue.length>FREE_LIMIT){queue=queue.slice(0,FREE_LIMIT);$('qlimit').classList.add('show');}
    renderQueue(); $('queue').classList.add('show');$('controls').classList.add('show');$('action').classList.add('show'); updateAction();
  }
  function renderQueue(){
    const list=$('queueList');list.innerHTML='';
    queue.forEach(q=>{
      const c=document.createElement('div');c.className='qchip';
      c.innerHTML=`<span class="qn">${q.name}</span><button class="qx"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg></button>`;
      c.querySelector('.qx').addEventListener('click',()=>{queue=queue.filter(x=>x.id!==q.id);if(queue.length<=FREE_LIMIT)$('qlimit').classList.remove('show');renderQueue();updateAction();if(!queue.length)hideWorkspace();});
      list.appendChild(c);
    });
    $('queueCount').textContent=queue.length?T().queueCount(queue.length):'';
  }
  function hideWorkspace(){$('queue').classList.remove('show');$('controls').classList.remove('show');$('action').classList.remove('show');}

  function updateAction(){
    const n=queue.length,f=selected.size,jobs=n*f,s=T();
    $('processBtn').disabled=n===0;
    $('processLabel').textContent = n===0? s.processStart : (f>1? s.processNF(n,f) : s.processN(n));
    $('actionMeta').innerHTML = n? s.metaJobs(jobs,f) : '';
  }

  // ---------- core resize ----------
  function processOne(file,fmt){
    return new Promise((resolve,reject)=>{
      const img=new Image(),url=URL.createObjectURL(file);
      img.onload=()=>{
        URL.revokeObjectURL(url);
        const canvas=document.createElement('canvas');canvas.width=fmt.w;canvas.height=fmt.h;
        const ctx=canvas.getContext('2d');ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
        const transparent=bgTransparent&&outType!=='image/jpeg';
        if(!transparent){ctx.fillStyle=bgColorVal;ctx.fillRect(0,0,fmt.w,fmt.h);}
        const sr=img.width/img.height,dr=fmt.w/fmt.h;let dw,dh;
        if(mode==='cover'){if(sr>dr){dh=fmt.h;dw=dh*sr;}else{dw=fmt.w;dh=dw/sr;}}
        else{if(sr>dr){dw=fmt.w;dh=dw/sr;}else{dh=fmt.h;dw=dh*sr;}}
        ctx.drawImage(img,(fmt.w-dw)/2,(fmt.h-dh)/2,dw,dh);
        const q=outType==='image/png'?undefined:quality;
        canvas.toBlob(blob=>{
          if(!blob){reject(new Error('encode'));return;}
          const ext=outType==='image/png'?'png':outType==='image/webp'?'webp':'jpg';
          const base=file.name.replace(/\.[^.]+$/,'');
          resolve({blob,url:URL.createObjectURL(blob),name:`${base}_${fmt.w}x${fmt.h}.${ext}`,oldSize:file.size,newSize:blob.size,w:fmt.w,h:fmt.h});
        },outType,q);
      };
      img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('load'));};
      img.src=url;
    });
  }

  async function processAll(){
    if(!queue.length)return;
    results.forEach(r=>URL.revokeObjectURL(r.url));results=[];
    const grid=$('grid');grid.innerHTML='';
    $('resultsHead').classList.add('show');$('savedTotal').textContent=T().working;
    const fmts=FORMATS.filter(f=>selected.has(f.id)),cards=[];
    for(const q of queue)for(const f of fmts){
      const card=document.createElement('div');card.className='card pending';
      card.innerHTML=`<div class="thumb"><div class="spinner"></div></div><div class="info"><div class="fn">${q.name}</div><div class="sz"><span class="new">${f.w}×${f.h}</span></div></div>`;
      grid.appendChild(card);cards.push({card,file:q.file,fmt:f});
    }
    let to=0,tn=0,done=0;
    for(const job of cards){
      try{const r=await processOne(job.file,job.fmt);results.push(r);to+=r.oldSize;tn+=r.newSize;done++;paintCard(job.card,r);}
      catch(e){job.card.querySelector('.thumb').innerHTML=`<div style="font-size:12px;color:#E5503F">${T().failed}</div>`;}
      await new Promise(r=>setTimeout(r,0));
    }
    const pct=to?Math.round((1-tn/to)*100):0;
    $('savedTotal').textContent = pct>0? T().savedPct(done,fmtBytes(to-tn),pct) : T().savedTot(done,fmtBytes(tn));
    $('resultsHead').scrollIntoView({behavior:'smooth',block:'nearest'});
    track('process_images',{images:queue.length,formats:selected.size,files:done});
  }

  function paintCard(card,r){
    card.classList.remove('pending');
    const pct=Math.round((1-r.newSize/r.oldSize)*100),up=pct<0;
    card.innerHTML=`<div class="thumb"><img src="${r.url}" alt="${r.name}"><span class="badge">${r.w}×${r.h}</span></div>
      <div class="info"><div class="fn" title="${r.name}">${r.name}</div>
      <div class="sz"><span class="old">${fmtBytes(r.oldSize)}</span><span class="arrow">→</span><span class="new">${fmtBytes(r.newSize)}</span><span class="pc ${up?'up':''}">${up?'+':'−'}${Math.abs(pct)}%</span></div>
      <button class="dl"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="13" height="13"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>${T().download}</button></div>`;
    card.querySelector('.dl').addEventListener('click',()=>{downloadBlob(r.blob,r.name);track('download_image');});
  }

  function downloadBlob(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1000);}

  async function downloadZip(){
    if(!isPro){openModal();return;}
    if(!results.length){showToast(T().tProcessFirst);return;}
    if(typeof JSZip==='undefined'){showToast(T().tZipLoad);return;}
    showToast(T().tZip);
    const zip=new JSZip();results.forEach(r=>zip.file(r.name,r.blob));
    const out=await zip.generateAsync({type:'blob'});downloadBlob(out,'postfit-export.zip');track('download_zip',{files:results.length});
  }

  // ---------- pro ----------
  function applyProState(){
    $('proPill').classList.toggle('is-pro',isPro);
    $('proPillText').textContent=isPro?T().proUnlocked:T().proUnlock;
    $('lockBack').style.display=isPro?'':'none';
    $('fmtSeg').querySelector('[data-out="image/webp"]').querySelectorAll('.pl').forEach(p=>p.style.display=isPro?'none':'');
    $('zipBtn').querySelectorAll('.pl').forEach(p=>p.style.display=isPro?'none':'');
    if(isPro)$('qlimit').classList.remove('show');
  }
  function openModal(){$('scrim').classList.add('show');}
  function closeModal(){$('scrim').classList.remove('show');}

  // ---------- events ----------
  const drop=$('drop'),fileInput=$('fileInput');
  drop.addEventListener('click',()=>fileInput.click());
  drop.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();fileInput.click();}});
  fileInput.addEventListener('change',e=>{addFiles(e.target.files);fileInput.value='';});
  ['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('drag');}));
  ['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();if(ev==='dragleave'&&drop.contains(e.relatedTarget))return;drop.classList.remove('drag');}));
  drop.addEventListener('drop',e=>{if(e.dataTransfer.files.length)addFiles(e.dataTransfer.files);});

  $('modeSeg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;mode=b.dataset.mode;$('modeSeg').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));$('bgwrap').classList.toggle('show',mode==='contain');});

  $('fmtSeg').addEventListener('click',e=>{
    const b=e.target.closest('button');if(!b)return;const out=b.dataset.out;
    if(out==='image/webp'&&!isPro){openModal();return;}
    outType=out;$('fmtSeg').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));
    const png=out==='image/png';$('qSlider').classList.toggle('disabled',png);$('qNote').textContent=png?T().pngNote:'';
    if(out==='image/jpeg'&&bgTransparent){bgTransparent=false;$('bgTransparent').checked=false;}
  });

  const qInput=$('quality');
  qInput.addEventListener('input',()=>{quality=+qInput.value/100;$('qVal').textContent=qInput.value+'%';qInput.style.setProperty('--pct',((qInput.value-40)/60*100)+'%');});
  qInput.style.setProperty('--pct','66.6%');

  $('bgColor').addEventListener('input',e=>{bgColorVal=e.target.value;});
  $('bgTransparent').addEventListener('change',e=>{if(e.target.checked&&outType==='image/jpeg'){showToast(T().tNoJpgAlpha);e.target.checked=false;return;}bgTransparent=e.target.checked;});

  $('processBtn').addEventListener('click',processAll);
  $('clearBtn').addEventListener('click',()=>{queue=[];results.forEach(r=>URL.revokeObjectURL(r.url));results=[];renderQueue();hideWorkspace();$('grid').innerHTML='';$('resultsHead').classList.remove('show');$('qlimit').classList.remove('show');});
  $('zipBtn').addEventListener('click',downloadZip);

  $('langSwitch').addEventListener('click',e=>{const b=e.target.closest('button');if(b)setLang(b.dataset.lang);});
  $('proPill').addEventListener('click',openModal);
  $('qlimitUnlock').addEventListener('click',openModal);
  $('multiUnlock').addEventListener('click',openModal);
  $('modalX').addEventListener('click',closeModal);
  $('scrim').addEventListener('click',e=>{if(e.target===$('scrim'))closeModal();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
  $('buyBtn').addEventListener('click',()=>{showToast(T().tCheckout);track('buy_click');});
  $('simUnlock').addEventListener('click',()=>{isPro=true;applyProState();closeModal();showToast(T().tProUnlocked);});
  $('relock').addEventListener('click',()=>{isPro=false;applyProState();showToast(T().tFree);});

  // ---------- init ----------
  injectHreflang();
  let initLang='en';
  try{const p=new URL(location.href).searchParams.get('lang');if(p==='ar'||p==='en')initLang=p;else if((navigator.language||'').toLowerCase().startsWith('ar'))initLang='ar';}catch(e){}
  setLang(initLang);
})();
</script>
</body>
